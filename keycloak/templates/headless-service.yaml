{{- /*
Keycloak Headless Service for StatefulSet
*/}}
apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-headless" (include "keycloak.fullname" .) | trunc 63 | trimSuffix "-" }}
  namespace: {{ include "keycloak.namespace" . | quote }}
  labels: {{- include "keycloak.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
  {{- with .Values.service.headless.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: {{ .Values.containerPorts.http }}
      protocol: TCP
      targetPort: http
    {{- with .Values.service.headless.extraPorts }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  publishNotReadyAddresses: true
  selector: {{- include "keycloak.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
