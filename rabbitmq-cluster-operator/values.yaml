## RabbitMQ Cluster Operator configuration
## Based on upstream v2.19.1 manifests

image:
  repository: rabbitmqoperator/cluster-operator
  tag: "2.19.1"
  pullPolicy: IfNotPresent

replicas: 1

resources:
  limits:
    cpu: 200m
    memory: 500Mi
  requests:
    cpu: 200m
    memory: 500Mi

serviceAccount:
  # Annotations to add to the service account (e.g. for IRSA, Workload Identity)
  annotations: {}

podAnnotations: {}

podLabels: {}

nodeSelector: {}

tolerations: []

affinity: {}

# Override the security context for the operator container
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

## Metrics configuration
metrics:
  service:
    # Enable metrics service
    enabled: true
    # Service port for metrics
    port: 9782
    # Annotations for the metrics service
    annotations: {}

  serviceMonitor:
    # Enable ServiceMonitor for Prometheus Operator
    enabled: false
    # Scrape interval
    interval: 30s
    # Scrape timeout
    scrapeTimeout: 10s
    # Additional labels for the ServiceMonitor
    labels: {}
    # Namespace for the ServiceMonitor (defaults to Release namespace)
    # namespace: monitoring

## Network Policy configuration
networkPolicy:
  # Enable network policy
  enabled: false
  # Allow all external egress traffic (permissive mode)
  allowExternalEgress: true
  # Additional ingress rules (e.g., to allow Prometheus scraping)
  extraIngress: []
  # Additional egress rules
  extraEgress: []
